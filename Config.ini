; Config.ini
[spider]
; 只抓这些年份（逗号分隔），例如：2023 或 2022,2023,2024
years = 2026,2025,2024,2023

; 随机间隔（秒）
sleep_min = 0
sleep_max = 0.2

; 超时与重试
timeout_sec = 20
max_retries = 4
retry_backoff_base = 0.8

; 是否额外拉取页面内的 css/js/img（更像浏览器）
fetch_assets = false
max_assets_per_page = 60

; 输出文件
output_json = output.json

; 可选：给所有结果填充一个 Journal（留空则自动从 URL 推断 /journals/<name>/）
journal =